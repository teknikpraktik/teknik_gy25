# Centralt figurregister. Varje figur som refereras från en avsnittsfil
# (via [[figur:ID]]) måste finnas här. Flera avsnitt får dela samma figur
# (se 12-produktionsarkitektur.md, "Figurer").
#
# Varje post är figurens fullständiga platshållarspecifikation (08, 12):
#   syfte                — vad figuren ska åstadkomma pedagogiskt
#   innehall             — vad figuren ska visa (förlagets underlag)
#   referens             — var och hur texten hänvisar till figuren
#   pedagogisk_funktion  — vilken roll figuren spelar i elevens förståelse
#   anvands_i            — avsnitts-id:n som refererar figuren

fig-1.1.1-a:
  syfte: "Visa att vardagliga och avancerade föremål är samma sak i grunden: tekniska lösningar på mänskliga behov"
  innehall: "Bildpar som ställer behov mot teknisk lösning, ordnade från enkel till komplex: skriva → penna, hålla ihop kläder → blixtlås, se skarpt → glasögon, rent vatten i kranen → vattentorn och reningsverk, betala i affären → Swish, resa långt → flygplan. Minst ett par visar en lösning som inte är ett föremål (Swish) och ett en anläggning (vattenförsörjningen)"
  referens: "Placeras i teoridelens inledning; texten hänvisar till figuren när begreppet teknisk lösning definieras och när missuppfattningen att teknik bara är föremål bemöts"
  pedagogisk_funktion: "Bär textens tre motbilder visuellt: teknik är inte bara elektronik, inte bara föremål och inte bara avancerat. Eleven ska kunna peka på vilket par som motbevisar respektive missuppfattning"
  anvands_i: ["1.1"]

fig-1.1.2-a:
  syfte: "Visa hur naturvetenskap, matematik och teknik samverkade i en och samma verkliga tekniska lösning"
  innehall: "Öresundsförbindelsen i översikt med bron, den konstgjorda ön Pepparholm och sänktunneln. Callouts pekar ut kunskapens hemvist: vindlaster, strömmar och kalkberggrunden (naturvetenskap), dimensionering av kablar och fundament (matematik), valet av kombinationen bro, ö och tunnel med hänsyn till flyget på Kastrup och sjöfarten (teknik)"
  referens: "Placeras vid rollgenomgången; texten hänvisar till figuren när de tre kunskapsområdenas roller beskrivs var för sig"
  pedagogisk_funktion: "Förankrar de tre abstrakta rollerna i ett och samma konkreta byggprojekt så att eleven ser att områdena verkar samtidigt i en verklig lösning, inte i tur och ordning"
  anvands_i: ["1.1"]

fig-1.2.1-a:
  syfte: "Visa att teknikutvecklingen inte är jämn: långa perioder av stillhet bryts av språng som kommer allt tätare"
  innehall: "Tidslinje från de första stenverktygen för över två miljoner år sedan till 1700-talet, med genombrotten markerade: stenverktyg, elden, jordbruket, skriften, vattenhjulet, boktryckarkonsten, oceansjöfarten. Avstånden mellan markeringarna ska avspegla verklig tid så att det enorma gapet mellan verktyg och jordbruk syns tydligt, gärna med bruten skala eller zoompaneler"
  referens: "Placeras vid textens inledning; texten hänvisar till figuren när utvecklingstakten och de allt tätare språngens mönster beskrivs"
  pedagogisk_funktion: "Bemöter missuppfattningen att teknikutveckling alltid gått snabbt. Eleven ska kunna avläsa att nästan hela teknikhistorien är långsam och att tempot ökar mot slutet"
  anvands_i: ["1.2"]

fig-1.2.1-b:
  syfte: "Göra boktryckarkonstens samhällsbetydelse mätbar genom att jämföra bokproduktion före och efter tryckpressen"
  innehall: "Jämförelse i två delar: en skrivare som kopierar en bok för hand (månaders eller års arbete per exemplar) mot en tryckpress som ger hundratals likadana exemplar, samt spridningsbilden femtio år efter Gutenberg med tryckpressar i över tvåhundra europeiska städer"
  referens: "Placeras vid avsnittet om boktryckarkonsten; texten hänvisar till figuren när skillnaden i produktionstakt beskrivs"
  pedagogisk_funktion: "Konkretiserar vad betydelse för samhället innebär: eleven ser att genombrottet inte var själva pressen utan vad den gjorde med kunskapens pris och spridning"
  anvands_i: ["1.2"]

fig-1.3.1-a:
  syfte: "Ge eleven en modell över drivkrafterna bakom teknikutveckling och visa att flera verkar samtidigt"
  innehall: "En teknisk lösning i mitten. Runt om de drivkrafter som kan sätta utvecklingen i rörelse, grupperade: behov och problem; kunskap och nya tekniska möjligheter; ekonomi och konkurrens; samt samhälle (politik, lagstiftning, kriser, infrastruktur och användarnas beteenden). Pilar från flera drivkrafter pekar in mot lösningen samtidigt. Tre historiska spår i kanten exemplifierar de vanligaste startpunkterna: ett behov (konserven), en möjlighet (telegrafen) och en samhällsförändring (Londons avlopp)"
  referens: "Placeras vid textens inledning; texten hänvisar till figuren när drivkrafterna namnges och när samspelet mellan dem beskrivs"
  pedagogisk_funktion: "Ger eleven en analysmodell: varje historiskt eller nutida exempel kan sorteras efter drivkraft, och de samtidiga pilarna visar att teknik sällan uppstår av en enda orsak"
  anvands_i: ["1.3"]

fig-1.2.2-a:
  syfte: "Ge överblick över de fyra industriella revolutionerna och visa att de tar decennier och bygger på varandra"
  innehall: "Tidslinje från 1700-talet till i dag med fyra överlappande fält: ånga och mekanisering (från ca 1760), elektricitet och massproduktion (från ca 1870), elektronik och automation (från ca 1970), digitalisering och AI (från ca 2010). Varje fält märks med sin kraft- eller teknikbas, ett kännetecknande teknikskifte och en central samhällsförändring. Fälten tonar inte ut, vilket visar att tidigare revolutioners teknik lever kvar"
  referens: "Placeras i inledningen av avsnitt 1.2; texten hänvisar till figuren när de fyra industriella revolutionerna introduceras"
  pedagogisk_funktion: "Ger eleven en gemensam karta över hela det historiska avsnittet och bemöter missuppfattningen att revolutionerna är korta händelser som avlöser varandra"
  anvands_i: ["1.2"]

fig-1.2.2-b:
  syfte: "Göra Sveriges samhällsomvandling under industrialiseringen avläsbar i siffror"
  innehall: "Diagram över andelen sysselsatta i jordbruk respektive industri i Sverige 1850 till 1950, med markerade händelser längs tidsaxeln: ångsågarna vid Norrlandskusten från 1850-talet, Sundsvallsstrejken 1879, emigrationens toppår kring 1880 och åttatimmarsdagen 1919. Kurvorna korsar varandra under periodens senare del"
  referens: "Placeras vid avsnittet om att Sverige byggs om; texten hänvisar till figuren när flytten från jordbruk till industri beskrivs"
  pedagogisk_funktion: "Låter eleven avläsa att samhällskonsekvenserna är mätbara och utdragna över generationer, och ger de enskilda händelserna en gemensam tidsaxel"
  anvands_i: ["1.2"]

fig-1.2.3-a:
  syfte: "Visa hur elmotorn och det löpande bandet förändrade hur en fabrik organiseras"
  innehall: "Jämförelse i två delar. Vänster: en fabrik med remdrift, där alla maskiner drivs av en central ångmaskin via remmar och axlar och måste stå nära kraftkällan. Höger: en fabrik med en elmotor vid varje maskin och ett löpande band där en produkt växer fram station för station. Callouts pekar ut standardiserade, utbytbara delar och att arbetaren gör ett enda moment"
  referens: "Placeras vid avsnittet om elmotorn och massproduktionen; texten hänvisar till figuren när skillnaden mot remdriften beskrivs"
  pedagogisk_funktion: "Gör abstraktionen massproduktion konkret: eleven ser varför elmotorn frigjorde fabriksplaneringen och hur det löpande bandet delar upp arbetet"
  anvands_i: ["1.2"]

fig-1.2.4-a:
  syfte: "Visa elektronikens utvecklingssteg och den exponentiella tillväxten i transistorantal"
  innehall: "Tidslinje från 1947 till i dag med stegen markerade: transistorn 1947, integrerade kretsen i slutet av 1950-talet, industriroboten IRB 6 1974, mikroprocessorn 1971 och persondatorn kring 1980. Under tidslinjen en kurva med logaritmisk skala som visar antal transistorer per krets, från en enda 1947 via 2 300 i den första mikroprocessorn till tiotals miljarder i dag"
  referens: "Placeras vid textens inledning; texten hänvisar till figuren när kedjan av utvecklingssteg och Moores lag beskrivs"
  pedagogisk_funktion: "Gör exponentiell tillväxt synlig: eleven ser att stegen bygger på varandra och att kurvans lutning förklarar varför datorer finns överallt"
  anvands_i: ["1.2"]

fig-1.2.4-b:
  syfte: "Visa hur människans roll på fabriksgolvet flyttas när automationen kommer"
  innehall: "Samma fabriksgolv i tre versioner: elmotorer vid varje maskin med arbetare som utför momenten, robotceller med styrskåp och en operatör bakom skyddsstaket, samt uppkopplade maskiner med sensorer där en tekniker övervakar via skärmar. Människans plats markeras tydligt i varje version"
  referens: "Placeras vid avsnittet om att maskiner styr maskiner; texten hänvisar till figuren när människans nya roll beskrivs"
  pedagogisk_funktion: "Låter eleven avläsa hur arbetsuppgiften vandrar från handen till maskinen till övervakningen, och att yrkesrollen förändras snarare än bara försvinner"
  anvands_i: ["1.2"]

fig-1.2.5-a:
  syfte: "Visa att digitala teknikskiften i olika branscher följer samma mönster"
  innehall: "Tre rader som vardera går från fysisk bärare till digital tjänst: musiken (vinylskiva och cd till streamingtjänst), fotografiet (filmrulle och fotobutik till mobilkamera och molnlagring), bankärendet (bankkontor med kassa till app i mobilen). En gemensam pil under raderna markerar mönstret: informationen lämnar sin fysiska bärare och kostnaden för en kopia går mot noll"
  referens: "Placeras efter branschexemplen; texten hänvisar till figuren när det gemensamma mönstret formuleras"
  pedagogisk_funktion: "Lyfter eleven från tre berättelser till ett återanvändbart mönster som kan tillämpas på nya branscher"
  anvands_i: ["1.2"]

fig-1.3.2-a:
  syfte: "Visa att en teknisk lösning formas av många faktorer samtidigt, inte utvecklas fritt"
  innehall: "En teknisk lösning i centrum, till exempel en mobiltelefon. Runt om, som faktorer som pekar in mot och formar lösningen: behov och användare, befintlig teknik att bygga vidare på, naturvetenskaplig och matematisk kunskap, material, energiförsörjning, digital infrastruktur, ekonomi och resurser, lagar och standarder, säkerhetskrav, underhåll samt tekniska avvägningar mellan konkurrerande krav. Figuren är medvetet en omgivningsbild, inte en pil- eller stegkedja"
  referens: "Placeras vid genomgången av vad som formar en lösning; texten hänvisar till figuren när faktorerna räknas upp och när mobiltelefonen används som exempel"
  pedagogisk_funktion: "Gör kärnpoängen avläsbar: lösningen i mitten omges av krav, resurser och begränsningar, och eleven ser att samma behov kan ge olika lösningar när omgivningen skiljer sig"
  anvands_i: ["1.3"]

fig-2.1.1-a:
  syfte: "Visa att samma behov kan ge helt olika lösningar beroende på hur problemet formuleras"
  innehall: "Förgrenad kedja med Hövdingfallet: behovet att skydda cyklistens huvud överst, därunder två problemformuleringar sida vid sida (gör hjälmen bekvämare respektive skydda huvudet utan att cyklisten bär något på det), och under varje formulering dess lösning: en förbättrad cykelhjälm respektive airbagkragen. Kedjans tre nivåer märks behov, tekniskt problem och teknisk lösning"
  referens: "Placeras vid avsnittet om problemformuleringens makt; texten hänvisar till figuren när Hövdingfallet beskrivs"
  pedagogisk_funktion: "Gör textens kärnidé avläsbar i en bild: problemformuleringen är en vägkorsning, inte en formalitet, och eleven ser exakt var de två vägarna skiljs åt"
  anvands_i: ["2.1"]

fig-2.1.2-a:
  syfte: "Visa problemformuleringens tre delar och hur de samspelar i ett verkligt fall"
  innehall: "En komplett problemformulering för ett möbelexempel uppställd i tre fält: funktionen (vad lösningen ska göra, formulerad utan att nämna någon lösning), kraven (prövbara villkor som måste uppfyllas, t.ex. bärförmåga och montering utan verktyg) och begränsningarna (ramar som kostnad, material och fraktvolym). Pilar visar att kraven prövar funktionen och att begränsningarna ramar in båda"
  referens: "Placeras efter att de tre delarna införts; texten hänvisar till figuren när exemplet med det platta paketet formuleras"
  pedagogisk_funktion: "Ger eleven mallen för egen problemformulering: de tre fälten är exakt vad eleven själv ska fylla i under de praktiska uppgifterna"
  anvands_i: ["2.1"]

fig-2.2.1-a:
  syfte: "Visa hur ett tekniskt problems karaktär, hur väl förstått det är och vad ett misslyckat försök kostar, pekar ut en lämplig problemlösningsstrategi"
  innehall: "Diagram med två axlar, utan eget namn på diagrammet: hur väl förstått problemet är (dåligt till väl) och vad ett misslyckat försök kostar (lågt till högt). Hela det välförstådda området märks återanvänd befintlig lösning (standarder, kardborren), eftersom kostnaden inte spelar roll när svaret redan är känt. I det dåligt förstådda området delas fälten efter kostnad: låg kostnad ger pröva och förbättra (apptester, Edisons glödtrådar), hög kostnad ger analysera innan du bygger (broar, Apollo 13). Diagrammet gäller bara problem som redan går att överblicka; en kort bildtext hänvisar till nästa avsnitt om nedbrytning för problem som inte gör det"
  referens: "Placeras vid avsnittet om de två frågorna; texten hänvisar till figuren utan att ge diagrammet ett eget namn"
  pedagogisk_funktion: "Förvandlar strategivalet från tyckande till bedömning: eleven kan placera ett nytt problem i diagrammet och läsa av vilken strategi som är rimlig. Att återanvänd-fältet spänner över hela det välförstådda området visar konkret att förståelse väger tyngre än kostnad, inte bara påstås i text"
  anvands_i: ["2.2"]

fig-2.2.2-a:
  syfte: "Visa hur ett sammansatt tekniskt problem bryts ned i delproblem som kan lösas och testas var för sig"
  innehall: "Nedbrytningsträd för robotgräsklipparen: det sammansatta problemet överst, därunder delproblemen klippa gräset, hålla sig inom arbetsområdet, undvika hinder, försörja sig med energi och tåla väder. Under ett av delproblemen (hålla sig inom området) visas en ytterligare nivå med exempel på hur även det kan delas. Tunna linjer mellan grenarna markerar kopplingar där delarna måste passa ihop"
  referens: "Placeras vid genomgången av robotgräsklipparens nedbrytning; texten hänvisar till figuren när delproblemen räknas upp"
  pedagogisk_funktion: "Ger eleven trädet som visuell form för egen nedbrytning och visar att nedbrytningen följer funktioner, inte fysiska bitar; kopplingslinjerna förebådar insikten att delarna måste passa ihop"
  anvands_i: ["2.2"]

fig-2.2.3-a:
  syfte: "Visa hur kardborrens naturliga krokar blev förebild för kardborrebandets konstruktion"
  innehall: "Två bilder sida vid sida: kardborrens krokformade taggar i mikroskopförstoring, och kardborrebandets konstgjorda krokar och öglor i motsvarande förstoring, med pilar som visar den formmässiga likheten"
  referens: "Placeras direkt efter berättelsen om kardborrebandets uppkomst; texten hänvisar till figuren när naturen som källa till en beprövad lösning beskrivs"
  pedagogisk_funktion: "Gör återanvändningen konkret och synlig: eleven ser att lösningen bokstavligen kopierades från naturen, i stället för att bara läsa påståendet"
  anvands_i: ["2.2"]

fig-2.2.4-a:
  syfte: "Visa hur upprepade, dokumenterade försök gradvis närmar sig en fungerande lösning"
  innehall: "Enkel iterationscykel med fyra steg i en ring: pröva, mät resultatet, dokumentera, justera. Vid ringen en kort logg i Edisons stil, tre rader med material, resultat och slutsats, som visar hur varje varv bygger på det förra i stället för att upprepa det"
  referens: "Placeras vid avsnittet om dokumentationens roll; texten hänvisar till figuren när skillnaden mellan metod och gissning förklaras"
  pedagogisk_funktion: "Gör det abstrakta 'pröva och förbättra' till en konkret, upprepningsbar cykel med ett tydligt fjärde steg (dokumentera) som är det eleven annars lätt hoppar över"
  anvands_i: ["2.2"]

fig-2.2.5-a:
  syfte: "Visa skillnaden mellan att lita på en lösning i skarpt läge och att först kontrollera den i en verifierad kopia"
  innehall: "Bildpar från Apollo 13: till vänster adaptern byggd och testad på marken i Houston (kontrollerad miljö, möjligt att öppna och göra om), till höger samma adapter byggd av besättningen ombord efter radioinstruktionerna (skarpt läge, ett enda försök). En pil mellan bilderna markerar att bygginstruktionen skickades först sedan marktestet godkänts"
  referens: "Placeras direkt efter beskrivningen av marktestet; texten hänvisar till figuren när det kontrollerade testets roll förklaras"
  pedagogisk_funktion: "Gör skillnaden mellan ett kontrollerat test och ett fullskaligt försök konkret och synlig: eleven ser att marktestet inte var ett extra steg utan det som gjorde att besättningen kunde lita på lösningen"
  anvands_i: ["2.2"]

fig-2.3.1-a:
  syfte: "Visa en komplett testplan i ifyllt skick så att eleven ser exakt vad som ska bestämmas före ett test"
  innehall: "Testplan som tabell för en termosflaska med tre krav. Kolumner: krav, testmetod, vad som mäts, godkäntgräns bestämd i förväg, resultat, godkänd eller underkänd. Rader t.ex. håller drycken varm (temperaturmätning efter sex timmar, gräns i grader), tål att tappas (fall från bänkhöjd mot hårt golv, gräns inga läckor eller sprickor), läcker inte i väskan (liggande med vatten i en timme, gräns torrt papper under). Resultatkolumnen ifylld så att ett krav är underkänt"
  referens: "Placeras allra först i texten, före löptexten; texten hänvisar till figuren direkt i öppningsstycket som exempel innan begreppet testplan definieras i ord"
  pedagogisk_funktion: "Gör testplanen till något eleven kan härma direkt: tabellen är samma struktur som eleven fyller i under de praktiska uppgifterna, och det underkända kravet visar att en ärlig testplan får visa fel"
  anvands_i: ["2.3.1"]

fig-2.3.2-a:
  syfte: "Visa att en och samma tekniska lösning kan bedömas mycket olika beroende på vilken aspekt som vägs tyngst"
  innehall: "Fyrfältstabell med elsparkcykeln bedömd på de fyra aspekterna funktion, kostnad, säkerhet och hållbar utveckling. Varje ruta får en kort plus- eller minusmarkering och en rad text, t.ex. funktion (plus: snabb och lätt att parkera), kostnad (plus: billig per resa, minus: dyr drift för operatören), säkerhet (minus: fler skador på akutmottagningar), hållbar utveckling (minus: kort livslängd i delningstjänst)"
  referens: "Placeras vid textens inledning; texten hänvisar till figuren när elsparkcykelexemplet vägs på de fyra vågskålarna"
  pedagogisk_funktion: "Visar konkret att en utvärdering inte ger ett enda facit: eleven ska kunna se att lösningen är stark på en aspekt och svag på en annan, och att helhetsbedömningen kräver att aspekterna vägs mot varandra"
  anvands_i: ["2.3.2"]

fig-2.3.3-a:
  syfte: "Visa hur upprepade varför-frågor leder från ett synligt symptom till en åtgärdbar grundorsak"
  innehall: "Kedjediagram över Galaxy Note 7-fallet: symptom (batteriet fattar eld) → varför (kortslutning i battericellen) → varför (den negativa elektroden trycks mot den positiva) → varför (för liten marginal i battericellens hölje hos en av leverantörerna) → grundorsak (för snäva tillverkningstoleranser) → åtgärd (större säkerhetsmarginal och en ny, mer omfattande batterikontroll)"
  referens: "Placeras vid avsnittet om att gräva med upprepade varför-frågor; texten hänvisar till figuren när metoden tillämpas på Note 7-fallet"
  pedagogisk_funktion: "Konkretiserar skillnaden mellan symptom och grundorsak genom att visa hela kedjan i ett enda välkänt fall, så att eleven kan applicera samma frågekedja på ett eget testresultat"
  anvands_i: ["2.3.3"]

fig-6.1.1-b:
  syfte: "Visa kraftpilens tre egenskaper och etablera kapitlets idealiserade gångbro som räknemodell"
  innehall: "Två delbilder. Vänster: en enda kraftpil mot ett föremål, där pilens längd är måttsatt och märkt 'storlek (N)', pilens riktning är markerad med en vinkel mot vågplanet och märkt 'riktning', och pilens startpunkt är ringad och märkt 'angreppspunkt'. Under bilden visas samma föremål med en dubbelt så lång pil och med pilen flyttad till en annan angreppspunkt, för att visa att var och en av de tre egenskaperna kan ändras för sig. Höger: kapitlets gångbro i genomskärning, ritad som konstruktionsmodell, med fri spännvidd 6,0 m och gångbanebredd 1,5 m måttsatta, stöden märkta A och B, egentyngden 3600 N markerad som en pil i brons mitt och den nyttiga lasten markerad som en pil ovanpå däcket. En liten ruta bredvid listar modellens antaganden: balkbro, stöden ger endast lodräta krafter, räcken och förband ingår inte"
  referens: "Placeras direkt efter styckena om kraftens tre egenskaper och angreppspunktens betydelse; texten hänvisar till figuren både när kraftvektorn införs och varje gång kapitlet återkommer till brons modell"
  pedagogisk_funktion: "Skiljer kraftpilens tre egenskaper åt visuellt i stället för att bara räkna upp dem, och ger eleven en stabil referensbild av gångbron som kan slås upp igen i avsnitten om jämvikt, hållfasthet och dimensionering, så att den röda tråden hålls samman med samma mått och samma antaganden genom hela kapitlet"
  anvands_i: ["6.1"]

fig-6.1.1-a:
  syfte: "Visa de namngivna krafttyperna som kraftpilar på konkreta, igenkännbara föremål"
  innehall: "Fyra delbilder med kraftdiagram. Först en gångtrafikant på gångbron: tyngdkraft nedåt, normalkraft uppåt från brodäcket. Sedan två delbilder som visar friktionskraftens riktning i motsatta fall: en låda som skjuts åt höger över ett golv, med friktionskraften ritad åt vänster, och ett drivhjul på en bil, där hjulet trycker bakåt mot vägbanan och friktionskraften på hjulet ritas framåt, med en text som markerar att det är friktionen som driver bilen. Sist drag och tryck: en lyftkättings dragkraft på en upphängd container, med en not om att kättingen bara kan bära drag, bredvid ett diagonalstag i en byggställning ritat i två lastfall, ett där staget dras och ett där det trycks. Varje kraft märks med namn och pilriktning"
  referens: "Placeras i slutet av delavsnittet om kraftbegreppet; texten hänvisar till figuren när tyngdkraft, normalkraft, friktionskraft, dragkraft och tryckkraft har införts"
  pedagogisk_funktion: "Ger eleven en samlad bild av de fem namngivna krafttyperna på verkliga tekniska objekt, så att namnen kan kopplas till både utseende och verkan snarare än memoreras var för sig"
  anvands_i: ["6.1"]

fig-6.1.2-a:
  syfte: "Visa hur två krafter läggs samman till en resultant och hur en kraft delas upp i komposanter"
  innehall: "Två delbilder. Vänster: de två bogserbåtarnas krafter (3000 N norrut, 4000 N österut) ritade som pilar i skala, med resultanten 5000 N inritad som diagonalen i den räta vinkeln, Pythagoras samband synligt. Höger: kälken som dras i ett 30-gradigt rep, med kraften F och dess horisontella och vertikala komposant inritade som en rätvinklig triangel"
  referens: "Placeras efter uträkningarna av resultant och komposanter; texten hänvisar till figuren för båda räkneexemplen"
  pedagogisk_funktion: "Låter eleven se sambandet mellan den räta triangeln i uträkningen och de faktiska kraftpilarna, så att formeln inte blir lösryckt från sin geometriska grund"
  anvands_i: ["6.1"]

fig-6.1.3-a:
  syfte: "Visa metoden friläggning i två steg, från en verklig situation till en frilagd bild med enbart kraftpilar"
  innehall: "Två delbilder sida vid sida. Vänster: en låda på ett sluttande plan i sitt sammanhang. Höger: samma låda frilagd, ritad som en enkel form med tyngdkraft, normalkraft och friktionskraft inritade som pilar och planet borttaget. En tredje, mindre delbild visar gångbron frilagd som en balk med två stödreaktioner uppåt och brons samt trafiklastens tyngd nedåt"
  referens: "Placeras vid exemplet med lådan på det sluttande planet och återknyts när gångbron friläggs; texten hänvisar till figuren i båda styckena"
  pedagogisk_funktion: "Gör själva friläggningssteget synligt, från föremål i sin miljö till en ren kraftbild, vilket är den svåraste delen av metoden för eleven att ta till sig på egen hand"
  anvands_i: ["6.1"]

fig-6.2.1-a:
  syfte: "Visa varför momentarmens längd är avgörande genom att jämföra samma kraft på olika avstånd från vridpunkten"
  innehall: "En dörr sedd uppifrån med gångjärnet till vänster. Två pilar av samma längd (samma kraft) ritas: en vid handtaget långt från gångjärnet, en nära gångjärnet. Momentarmen r markeras med ett mått i båda fallen, och den resulterande vridningen illustreras med en böjd pil vars tjocklek skiljer sig mellan de två fallen"
  referens: "Placeras efter uträkningen av kraften vid handtaget jämfört med nära gångjärnen; texten hänvisar till figuren när skillnaden mellan 20 N och 160 N förklaras"
  pedagogisk_funktion: "Gör den abstrakta momentformeln konkret genom att visa att det är avståndet till vridpunkten, inte bara kraften, som avgör hur lätt dörren går att öppna"
  anvands_i: ["6.2"]

fig-6.2.1-b:
  syfte: "Visa verkningslinjen och den vinkelräta momentarmen när en kraft verkar snett"
  innehall: "En nyckel på en mutter, sedd rakt uppifrån, med handtaget 0,25 m långt. Kraften 300 N ritas i vinkeln 70 grader mot handtaget. Kraftens verkningslinje förlängs som en streckad linje åt båda hållen förbi angreppspunkten. Från muttern dras ett vinkelrätt streck ut till verkningslinjen, måttsatt 0,235 m och märkt 'momentarm'. I samma bild ritas kraften även uppdelad i två komposanter, en längs handtaget och en vinkelrät mot det, där den vinkelräta är märkt 282 N. Bredvid visas i blekare linjer samma nyckel med en helt vinkelrät kraft på 300 N och momentarmen 0,25 m, som jämförelsefall. Båda fallens moment skrivs ut, 70 Nm respektive 75 Nm"
  referens: "Placeras efter de två uträkningarna av momentet vid snett verkande kraft; texten hänvisar till figuren för både komposantmetoden och metoden med vinkelrät momentarm"
  pedagogisk_funktion: "Visar att de två räknesätten är samma sak sedda från två håll och gör synligt varför M = F · r inte får användas rakt av när kraften lutar, vilket annars är det vanligaste felet eleven gör i momentberäkningar"
  anvands_i: ["6.2"]

fig-6.2.2-a:
  syfte: "Visa hävarmsprincipen och utväxlingen i två tekniska tillämpningar: en skiftnyckel och en bultsax"
  innehall: "Två delbilder. Vänster: en skiftnyckel som drar åt en mutter, med och utan pårör, där momentarmarna 0,3 m och 0,6 m är måttsatta och de kraftvärden som krävs, 400 N och 200 N, är utskrivna. Höger: en bultsax i genomskärning vid leden, med handkraften 200 N inritad 0,45 m från leden och kraften i skäreggen 2250 N inritad 0,04 m från samma led. Båda momentarmarna är måttsatta och det gemensamma momentet 90 Nm markeras kring leden. Under bilden visas med två streckade bågar hur långt handtaget respektive skäreggen rör sig, så att den längre rörelsesträckan vid handtaget framgår"
  referens: "Placeras vid exemplen med skiftnyckeln och bultsaxen; texten hänvisar till figuren för båda uträkningarna och när priset för hög utväxling förklaras"
  pedagogisk_funktion: "Visar att samma princip förklarar både en förlängd nyckel och ett verktyg med kraftig utväxling, och gör synligt att utväxlingen betalas med rörelsesträcka, vilket annars är den del av hävarmsprincipen eleven lättast missar"
  anvands_i: ["6.2"]

fig-6.3.1-a:
  syfte: "Visa att jämvikt kräver att både kraftsumman och momentsumman är noll, inte bara den ena"
  innehall: "Två delbilder. Vänster: ett föremål med två motriktade, lika stora krafter som griper an i samma punkt (kraftsumma noll, momentsumma noll, verklig jämvikt). Höger: samma föremål med samma två krafter men förskjutna till olika angreppspunkter (kraftsumma fortfarande noll, men ett moment kvarstår och föremålet roterar)"
  referens: "Placeras vid stycket om att kraftsumma noll inte räcker; texten hänvisar till figuren när skillnaden mellan de två fallen förklaras"
  pedagogisk_funktion: "Motverkar missuppfattningen att jämvikt bara handlar om kraftsumman, genom att visa ett fall där kraftsumman är noll men föremålet ändå roterar"
  anvands_i: ["6.3"]

fig-6.3.2-b:
  syfte: "Visa vilka krafter och moment de tre idealiserade stödtyperna kan ta upp"
  innehall: "Tre delbilder i rad, var och en med en balkände i ett stöd ritad med den symbol som normalt används på konstruktionsritningar. Ledstöd: triangel med fast spets, med två reaktionspilar inritade, en lodrät och en vågrät, och en böjd pil markerad med kryss för att visa att stödet inte tar upp moment. Rullstöd: triangel på rullar, med endast en lodrät reaktionspil, och en dubbelriktad pil längs underlaget som visar att balken får röra sig i sidled. Inspänning: balken infäst i en väggsektion, med lodrät reaktionspil, vågrät reaktionspil och en böjd momentpil. Under varje delbild ett verkligt exempel: brolager, rullager på en stålbro som får längdändra sig i värme, och en balkong som skjuter ut ur en husvägg"
  referens: "Placeras efter stycket om idealiserade stödtyper och före räkneexemplet på gångbron; texten hänvisar till figuren när ledstöd, rullstöd och inspänning införs och när antagandet om enbart lodräta reaktioner motiveras"
  pedagogisk_funktion: "Motverkar den vanliga missuppfattningen att varje stöd alltid ger en enda lodrät kraft, genom att visa vad de tre stödtyperna faktiskt kan ta upp innan förenklingen görs, så att eleven förstår att förenklingen är ett val och inte en naturlag"
  anvands_i: ["6.3"]

fig-6.3.2-a:
  syfte: "Visa uppställningen och lösningen av stödreaktionerna för gångbron, med och utan egentyngd"
  innehall: "Två frilagda balkar under varandra, båda 6,0 m långa med stöden A och B. Övre: endast cyklistens tyngd 900 N, markerad 2,0 m från stöd A, med måtten 2,0 m och 4,0 m och de beräknade stödreaktionerna 600 N och 300 N utskrivna. En text markerar att egentyngden är försummad i det här steget. Undre: samma balk med cyklisten kvar och dessutom egentyngden 3600 N inritad som en pil i brons mitt, 3,0 m från vardera stödet, med de beräknade stödreaktionerna 2400 N och 2100 N utskrivna. Bredvid den undre bilden visas den jämnt fördelade egentyngden som en rad små pilar längs balken, med en likhetspil till den enda samlade pilen i mitten, för att visa vilken idealisering som gjorts"
  referens: "Placeras vid uträkningarna av stödreaktionerna; texten hänvisar till figuren genom båda räkneexemplen och vid jämförelsen mellan dem"
  pedagogisk_funktion: "Låter eleven följa vilka mått och krafter som hör ihop i ekvationerna, och gör skillnaden mellan de två beräkningarna direkt avläsbar, så att effekten av att försumma egentyngden blir synlig i stället för att bara påstås i texten"
  anvands_i: ["6.3"]

fig-6.3.3-a:
  syfte: "Visa sambandet mellan tyngdpunkt, stödyta och stabilitet, samt när en konstruktion välter"
  innehall: "Tre delbilder. Först en lyftkran med tyngdpunkt och stödyta markerade, med det stabiliserande och det vältande momentet inritade som pilar kring stödpunkten. Sedan samma kran med en tyngre last, där den lodräta linjen genom den samlade tyngdpunkten faller utanför stödytan. Sist en hög bokhylla jämförd med en låg och bred, med tyngdpunktens höjd och stödytans bredd markerade i båda"
  referens: "Placeras vid stycket om lyftkranens stabilitet; texten hänvisar till figuren när det stabiliserande och det vältande momentet räknas ut samt vid jämförelsen med bokhyllan"
  pedagogisk_funktion: "Gör den abstrakta regeln 'linjen genom tyngdpunkten måste falla innanför stödytan' konkret och visuellt verifierbar i tre olika fall"
  anvands_i: ["6.3"]

fig-6.4.1-a:
  syfte: "Visa de fem belastningstyperna sida vid sida på igenkännbara konstruktionsdelar"
  innehall: "Fem smårutor i en rad, en per belastningstyp: drag (spänd lyftkätting), tryck (belastad pelare), böjning (balk som böjer sig, med dragzonen på undersidan och tryckzonen på ovansidan markerade och området mellan dem märkt som lågspänningsområde), skjuvning (en nit som håller ihop två plåtar som dras åt var sitt håll, med snittet markerat) och vridning (en drivaxel som vrids av ett vridmoment, med vridmomentet ritat som en böjd pil märkt 'belastning' och den vridna deformationen visad med en ursprungligen rak linje längs axeln som blivit spiralformad, märkt 'följd'). Varje ruta har pilar som visar kraftens eller momentets riktning"
  referens: "Placeras efter genomgången av de fem belastningstyperna och före stycket om knäckning; texten hänvisar till figuren som en samlad översikt"
  pedagogisk_funktion: "Ger eleven en direkt jämförelsebild mellan de fem belastningstyperna, och skiljer i vridningsrutan tydligt på vridmomentet som orsak och vridningen som följd, vilket är den distinktion som annars lättast går förlorad"
  anvands_i: ["6.4"]

fig-6.4.1-b:
  syfte: "Visa knäckning som en instabilitet hos slanka tryckbelastade detaljer, skild från de fem belastningstyperna"
  innehall: "Tre delbilder. Vänster: tre pelare av samma material och samma tvärsnitt men med olika längd, alla tryckbelastade uppifrån, där den längsta har vikt ut kraftigt åt sidan, den mellersta börjat böja ut och den kortaste står rak. Under varje pelare anges den last som orsakade knäckning, så att sambandet mellan längd och bärförmåga framgår. Mitten: samma pelarlängd i två infästningar, en ledad i båda ändar och en fast inspänd i båda ändar, där den inspända bär högre last innan den viker ut. Höger: en lång, slank vajer belastad i drag, ritad rak och stabil, med texten att samma slankhet inte är något problem vid drag"
  referens: "Placeras efter stycket om knäckning; texten hänvisar till figuren när slankheten och infästningens betydelse förklaras och när drag jämförs med tryck"
  pedagogisk_funktion: "Gör synligt att knäckning är ett geometri- och stabilitetsfenomen snarare än en materialgräns, och att det saknar motsvarighet vid drag, vilket motverkar att eleven radar upp knäckning som en sjätte belastningstyp"
  anvands_i: ["6.4"]

fig-6.4.2-a:
  syfte: "Visa hur samma kraft ger olika spänning beroende på tvärsnittsarea, och hur en stång töjs ut under belastning"
  innehall: "Två delbilder. Vänster: två lika långa stänger med samma dragkraft men olika tvärsnittsarea, 100 mm² och 200 mm², med respektive spänning 200 MPa och 100 MPa angiven. Höger: en stång före och efter belastning, med ursprungslängden 2000 mm och förlängningen 1 mm tydligt uppmätta och markerade"
  referens: "Placeras vid uträkningarna av spänning respektive töjning; texten hänvisar till figuren för båda räkneexemplen"
  pedagogisk_funktion: "Gör skillnaden mellan kraft och spänning konkret genom att visa att samma kraft ger olika resultat beroende på tvärsnittet, samt visualiserar vad en töjning på 0,05 procent faktiskt innebär"
  anvands_i: ["6.4"]

fig-6.4.3-a:
  syfte: "Visa en dragprovkurvas förlopp och var elasticitetsmodul, sträckgräns och brottgräns avläses"
  innehall: "Ett spänning-töjning-diagram för en stålprovstav. Den räta, elastiska delen av kurvan markeras med sin lutning och märks elasticitetsmodulen, med en not om att lutningen bara går att avläsa här. Punkten där kurvan böjer av markeras som sträckgränsen, och området till höger om den märks plastiskt område. Kurvans högsta punkt markeras som brottgränsen, med förtydligandet att detta är den största nominella spänningen under provet. Den fallande delen efter toppen märks halsning, och kurvans slutpunkt märks brott, tydligt lägre än brottgränsen. Under diagrammet visas provstaven i fyra lägen som motsvarar fyra punkter på kurvan: obelastad, elastiskt sträckt, med begynnande midja vid halsningen, och avsliten. En liten skiss av dragprovningsmaskinen placeras bredvid"
  referens: "Placeras vid genomgången av dragprovkurvan; texten hänvisar till figuren när elasticitetsmodul, sträckgräns och brottgräns förklaras"
  pedagogisk_funktion: "Låter eleven koppla varje avläst storhet till en bestämd punkt eller lutning på kurvan, i stället för att bara memorera definitionerna som lösryckt text"
  anvands_i: ["6.4"]

fig-6.5.1-a:
  syfte: "Visa I-balkens arbetsfördelning mellan flänsar och liv, och skilja styvhet från styvhet per vikt"
  innehall: "Tre delbilder. Vänster: ett I-balkstvärsnitt med flänsarna och livet utmärkta med namn, neutralaxeln inritad som en streckad linje genom livets mitt, och spänningsfördelningen ritad som en triangulär fördelning intill tvärsnittet: största tryckspänning i övre flänsen, största dragspänning i undre flänsen, noll vid neutralaxeln. Två textnotiser pekar ut att flänsarna tar huvuddelen av drag- och tryckspänningen och att livet håller flänsarna åtskilda och överför huvuddelen av skjuvkraften. Mitten: en massiv rektangulär balk med samma materialmängd som I-balken, med samma spänningsfördelning inritad, så att det framgår hur mycket av materialet som sitter nära neutralaxeln och bidrar lite. Höger: ett rör och en massiv rundstång med samma ytterdiameter, sedda i tvärsnitt, med vikt per meter angiven för båda och en text som slår fast att den massiva stången är styvare men tyngre, medan röret ger mest styvhet per kilogram"
  referens: "Placeras vid genomgången av I-balken; texten hänvisar till figuren när flänsarnas och livets uppgifter förklaras och när röret jämförs med den massiva stången"
  pedagogisk_funktion: "Gör principen 'material långt från neutralaxeln bidrar mest' visuellt begriplig, och förebygger med den högra delbilden den vanliga överdriften att ett rör alltid skulle vara styvare än en massiv stång"
  anvands_i: ["6.5"]

fig-6.5.2-a:
  syfte: "Visa hur en takstol och en fackverksbro leder krafter genom triangulerade stavar till sina stöd"
  innehall: "Två delbilder. Vänster: en takstol med sneda ben i tryck och en vågrät dragstång i drag, markerade med olika färg eller mönster, och taklasten och stödreaktionerna vid väggarna inritade. Höger: en fackverksbro i genomskärning med diagonalstavar markerade som drag respektive tryck beroende på position, och lastvägen från körbanan till stöden markerad med pilar genom konstruktionen"
  referens: "Placeras vid stycket om lastväg och triangulering; texten hänvisar till figuren för både takstolen och fackverksbron"
  pedagogisk_funktion: "Låter eleven följa en last visuellt genom en verklig triangulerad konstruktion, från angreppspunkt till stöd, och se att drag och tryck växlar mellan olika stavar"
  anvands_i: ["6.5"]

fig-6.5.2-b:
  syfte: "Visa att en båge levererar sneda upplagskrafter och att upplagen måste ta upp en vågrät kraft"
  innehall: "En stenvalvbro i genomskärning med en lodrät last ovanifrån. Tryckkraften ritas som en kedja av pilar som följer bågens krökning ner mot fötterna, där pilarna successivt lutar mer. Vid vardera foten delas upplagskraften upp i sina komposanter: en lodrät och en tydligt utmärkt vågrät, riktad utåt från bron, märkt 'bågen strävar efter att sparka ut fötterna'. De tunga landfästena och berget bakom dem ritas in som det som tar upp den vågräta kraften. En mindre delbild bredvid visar en takstol med samma sak löst på ett annat sätt: dragstången mellan takstolsbenens fötter markeras med en dragpil som balanserar den vågräta kraften. En tredje, liten delbild visar vad som händer när upplaget inte klarar kraften: fötterna glider isär och bågen sjunker ihop"
  referens: "Placeras efter styckena om bågen; texten hänvisar till figuren när den vågräta komposanten införs och när stenbron jämförs med takstolen"
  pedagogisk_funktion: "Rättar den vanliga bilden att en båge bara trycker rakt nedåt, genom att visa var den vågräta kraften kommer ifrån och vad som händer om den inte tas om hand, vilket kopplar bågens funktion direkt till kravet på grundläggningen"
  anvands_i: ["6.5"]

fig-6.5.3-a:
  syfte: "Jämföra en balkbro och en fackverksbro för samma spännvidd utifrån materialåtgång och komplexitet"
  innehall: "En balkbro och en fackverksbro ritade sida vid sida över samma spännvidd, med ungefärlig materialmängd och antal förband angivet för respektive lösning. En liten tabell eller ikonrad under bilderna sammanfattar hållfasthet, vikt, materialåtgång, tillverkning och kostnad för de två alternativen"
  referens: "Placeras vid jämförelsen mellan balkbro och fackverksbro; texten hänvisar till figuren när valet av konstruktionsprincip diskuteras"
  pedagogisk_funktion: "Konkretiserar att valet av konstruktionsprincip är en avvägning mellan flera egenskaper snarare än ett enda rätt svar"
  anvands_i: ["6.5"]

fig-6.6.1-a:
  syfte: "Visa de fyra lasttyperna på en gångbro och skilja statisk från dynamisk belastning"
  innehall: "Två delbilder. Vänster: kapitlets gångbro med egentyngd, nyttig last, vindlast och snölast markerade med separata pilar och etiketter på respektive del av konstruktionen. Bredvid bron ställs två belastningsfall mot varandra i samma skala: en enskild cyklist på några hundra newton, och full gångtrafik på 4 kN per kvadratmeter över hela den 9,0 m² stora gångbanan, alltså 36 000 N, så att storleksskillnaden syns direkt. Höger: Millennium Bridge-förloppet ritat som en återkopplingsslinga i fyra steg med pilar i en cirkel: bron rör sig något i sidled, de gående anpassar stegen för att hålla balansen, stegens sidokrafter blir mer samtidiga, rörelsen förstärks, tillbaka till steg ett. Under slingan en kort text som markerar att förloppet inte är en slump utan en koppling mellan bron och de gående"
  referens: "Placeras efter genomgången av lasttyperna; texten hänvisar till figuren vid jämförelsen mellan belastningsfallen och vid Millennium Bridge"
  pedagogisk_funktion: "Ger en samlad bild av var olika lasttyper angriper och gör med jämförelsen mellan belastningsfallen tydligt varför det vardagliga fallet sällan är det dimensionerande. Återkopplingsslingan ersätter den förenklade bilden att fotgängarna råkade gå i takt med den mekanism som faktiskt låg bakom"
  anvands_i: ["6.6"]

fig-6.6.2-a:
  syfte: "Visa hela beräkningskedjan för lyftstaget och placera den i den betydligt större verkliga dimensioneringsprocessen"
  innehall: "Överst lyftstaget i en verkstadstravers, ritat som en rak, lodrätt hängande rundstång med dragkraften 47 000 N inritad. Under det en kedja i fem rutor med pil mellan varje: tillåten spänning 235 / 2 = 117,5 N/mm², minsta area 47 000 / 117,5 = 400 mm², teoretisk minsta diameter 22,6 mm, vald standarddimension 25 mm, kontrollräknad verklig spänning 96 N/mm². Den sista rutan märks tydligt som ett obligatoriskt steg. Under kedjan en bredare stapel eller ram som visar den verkliga dimensioneringsprocessens omfattning, med lastkombinationer, standarder, materialvariation, geometri, stabilitet, deformationskrav, utmattning, förband, beständighet, tillverkning samt kontroll och provning, där bara det smala fält som motsvarar beräkningskedjan ovan är ifyllt och resten är tomt"
  referens: "Placeras efter beräkningen av lyftstaget och kontrollräkningen; texten hänvisar till figuren både när stegen genomförs och när den verkliga processens omfattning beskrivs"
  pedagogisk_funktion: "Låter eleven se hela kedjan från last till vald dimension i ett sammanhang, med kontrollräkningen som ett synligt sista steg, och gör med den tomma delen av processfältet konkret hur liten del av en verklig dimensionering kapitlets modell utgör"
  anvands_i: ["6.6"]

fig-6.6.3-a:
  syfte: "Visa hur en enhetskontroll avslöjar ett fel som annars är lätt att missa"
  innehall: "Två parallella uträkningar av lyftstagets tvärsnittsarea sida vid sida: en korrekt, med kraften i newton, som ger 400 mm², och en felaktig, där kraften av misstag lämnats i kilonewton (47 i stället för 47 000), som ger en area på 0,4 mm² och en diameter under en millimeter. De två diametrarna ritas ut i verklig storlek intill varandra, den korrekta som en stång ungefär lika grov som en tumme och den felaktiga som en tunn tråd, med lasten på nästan fem ton, motsvarande ungefär tre personbilar, angiven ovanför båda"
  referens: "Placeras vid stycket om enhetskontroll; texten hänvisar till figuren när exemplet med den förväxlade enheten förklaras"
  pedagogisk_funktion: "Gör risken med enhetsfel konkret och synlig genom att visa den felaktiga och den korrekta uträkningen sida vid sida i stället för att bara beskriva risken i text"
  anvands_i: ["6.6"]
