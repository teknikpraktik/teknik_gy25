# Centralt figurregister. Varje figur som refereras från en lärandemålsfil
# (via [[figur:ID]]) måste finnas här. Flera lärandemål får dela samma figur
# (se 12-produktionsarkitektur.md, "Figurer").
#
# Varje post är figurens fullständiga platshållarspecifikation (08, 12):
#   syfte                — vad figuren ska åstadkomma pedagogiskt
#   innehall             — vad figuren ska visa (förlagets underlag)
#   referens             — var och hur texten hänvisar till figuren
#   pedagogisk_funktion  — vilken roll figuren spelar i elevens förståelse
#   anvands_i            — lärandemåls-id:n som refererar figuren

fig-1.1.1-a:
  syfte: "Visa att vardagliga och avancerade föremål är samma sak i grunden: tekniska lösningar på mänskliga behov"
  innehall: "Bildpar som ställer behov mot teknisk lösning, ordnade från enkel till komplex: skriva → penna, hålla ihop kläder → blixtlås, se skarpt → glasögon, rent vatten i kranen → vattentorn och reningsverk, betala i affären → Swish, resa långt → flygplan. Minst ett par visar en lösning som inte är ett föremål (Swish) och ett en anläggning (vattenförsörjningen)"
  referens: "Placeras i teoridelens inledning; texten hänvisar till figuren när begreppet teknisk lösning definieras och när missuppfattningen att teknik bara är föremål bemöts"
  pedagogisk_funktion: "Bär uppslagets tre motbilder visuellt: teknik är inte bara elektronik, inte bara föremål och inte bara avancerat. Eleven ska kunna peka på vilket par som motbevisar respektive missuppfattning"
  anvands_i: ["1.1.1"]

fig-1.1.2-a:
  syfte: "Visa hur naturvetenskap, matematik och teknik samverkade i en och samma verkliga tekniska lösning"
  innehall: "Öresundsförbindelsen i översikt med bron, den konstgjorda ön Pepparholm och sänktunneln. Callouts pekar ut kunskapens hemvist: vindlaster, strömmar och kalkberggrunden (naturvetenskap), dimensionering av kablar och fundament (matematik), valet av kombinationen bro, ö och tunnel med hänsyn till flyget på Kastrup och sjöfarten (teknik)"
  referens: "Placeras vid rollgenomgången; texten hänvisar till figuren när de tre kunskapsområdenas roller beskrivs var för sig"
  pedagogisk_funktion: "Förankrar de tre abstrakta rollerna i ett och samma konkreta byggprojekt så att eleven ser att områdena verkar samtidigt i en verklig lösning, inte i tur och ordning"
  anvands_i: ["1.1.2"]

fig-1.2.1-a:
  syfte: "Visa att teknikutvecklingen inte är jämn: långa perioder av stillhet bryts av språng som kommer allt tätare"
  innehall: "Tidslinje från de första stenverktygen för över två miljoner år sedan till 1700-talet, med genombrotten markerade: stenverktyg, elden, jordbruket, skriften, vattenhjulet, boktryckarkonsten, oceansjöfarten. Avstånden mellan markeringarna ska avspegla verklig tid så att det enorma gapet mellan verktyg och jordbruk syns tydligt, gärna med bruten skala eller zoompaneler"
  referens: "Placeras vid uppslag 1:s inledning; texten hänvisar till figuren när utvecklingstakten och de allt tätare språngens mönster beskrivs"
  pedagogisk_funktion: "Bemöter missuppfattningen att teknikutveckling alltid gått snabbt. Eleven ska kunna avläsa att nästan hela teknikhistorien är långsam och att tempot ökar mot slutet"
  anvands_i: ["1.2.1"]

fig-1.2.1-b:
  syfte: "Göra boktryckarkonstens samhällsbetydelse mätbar genom att jämföra bokproduktion före och efter tryckpressen"
  innehall: "Jämförelse i två delar: en skrivare som kopierar en bok för hand (månaders eller års arbete per exemplar) mot en tryckpress som ger hundratals likadana exemplar, samt spridningsbilden femtio år efter Gutenberg med tryckpressar i över tvåhundra europeiska städer"
  referens: "Placeras vid avsnittet om boktryckarkonsten på uppslag 2; texten hänvisar till figuren när skillnaden i produktionstakt beskrivs"
  pedagogisk_funktion: "Konkretiserar vad betydelse för samhället innebär: eleven ser att genombrottet inte var själva pressen utan vad den gjorde med kunskapens pris och spridning"
  anvands_i: ["1.2.1"]

fig-1.2.2-a:
  syfte: "Visa de tre drivkrafterna bakom teknikutveckling och att de ofta verkar tillsammans"
  innehall: "Tre spår som vart och ett leder från drivkraft till teknisk lösning: arméernas behov av hållbar mat leder till konserveringen, kunskapen om elektromagnetismen leder till telegrafen, städernas tillväxt leder till avloppssystemen. Nederst ett sammanflöde där alla tre spåren möts i Londons kolerabekämpning: behovet av rent vatten, kunskapen om smittvägen och den växande staden"
  referens: "Placeras vid uppslagets inledning; texten hänvisar till figuren när de tre drivkrafterna namnges och när samspelet mellan dem beskrivs"
  pedagogisk_funktion: "Ger eleven ett mönster att analysera med: varje historiskt exempel kan sorteras efter drivkraft, och sammanflödet visar att verkliga genombrott sällan har en ensam orsak"
  anvands_i: ["1.2.2"]

fig-1.3.1-a:
  syfte: "Ge överblick över de fyra industriella revolutionerna och visa att de tar decennier och bygger på varandra"
  innehall: "Tidslinje från 1700-talet till i dag med fyra överlappande fält: ånga och mekanisering (från ca 1760), elektricitet och löpande band (från ca 1870), elektronik och automation (från ca 1970), uppkoppling och AI (från ca 2010). Varje fält märks med sin kraft- eller teknikbas och ett kännetecknande teknikskifte. Fälten tonar inte ut, vilket visar att tidigare revolutioners teknik lever kvar"
  referens: "Placeras vid uppslag 1:s inledning; texten hänvisar till figuren när de fyra revolutionerna räknas upp"
  pedagogisk_funktion: "Bemöter missuppfattningen att revolutionerna är korta händelser som avlöser varandra: eleven ser långa, överlappande processer i stället för fyra staket"
  anvands_i: ["1.3.1"]

fig-1.3.1-b:
  syfte: "Visa teknikskiftena som förändringar av samma verklighet och hur människans roll på fabriksgolvet flyttas"
  innehall: "Samma fabriksgolv i fyra versioner: remdrift från en central ångmaskin med arbetare vid varje maskin, elmotorer vid varje maskin och löpande band, robotceller med styrskåp och operatör bakom skyddsstaket, uppkopplade maskiner med sensorer där tekniker övervakar via skärmar. Människans plats markeras tydligt i varje version"
  referens: "Placeras vid uppslag 2:s avsnitt om lager på lager; texten hänvisar till figuren när revolutionernas samexistens i dagens fabrik beskrivs"
  pedagogisk_funktion: "Konkretiserar de abstrakta epokerna till en igenkännbar miljö och låter eleven avläsa hur arbetsuppgifterna vandrar från handen till maskinen till övervakningen"
  anvands_i: ["1.3.1"]

fig-1.3.2-a:
  syfte: "Göra Sveriges samhällsomvandling under industrialiseringen avläsbar i siffror"
  innehall: "Diagram över andelen sysselsatta i jordbruk respektive industri i Sverige 1850 till 1950, med markerade händelser längs tidsaxeln: ångsågarna vid Norrlandskusten från 1850-talet, Sundsvallsstrejken 1879, emigrationens toppår kring 1880, åttatimmarsdagen 1919. Kurvorna korsar varandra under periodens senare del"
  referens: "Placeras vid avsnittet om levnadsvillkoren; texten hänvisar till figuren när flytten från land till stad och från jordbruk till industri beskrivs"
  pedagogisk_funktion: "Låter eleven avläsa att samhällskonsekvenserna är mätbara och utdragna över generationer, och ger de enskilda händelserna i texten en gemensam tidsaxel"
  anvands_i: ["1.3.2"]

fig-1.4.1-a:
  syfte: "Visa digitalteknikens utvecklingssteg som en obruten kedja och den exponentiella tillväxten i transistorantal"
  innehall: "Tidslinje 1947 till i dag med stegen markerade: transistorn 1947, integrerade kretsen 1958, mikroprocessorn 1971, persondatorn kring 1980, webben 1991, smartphonen 2007, maskininlärningens genombrott 2012. Under tidslinjen en kurva med logaritmisk skala som visar antal transistorer per krets, från en enda 1947 via 2 300 i Intel 4004 till tiotals miljarder i dag"
  referens: "Placeras vid uppslagets inledning; texten hänvisar till figuren när kedjan av utvecklingssteg och Moores lag beskrivs"
  pedagogisk_funktion: "Gör exponentiell tillväxt synlig: eleven ser att stegen inte är fristående uppfinningar utan bygger på varandra, och att kurvans lutning är hela förklaringen till att datorer finns överallt"
  anvands_i: ["1.4.1"]

fig-1.4.2-a:
  syfte: "Visa att digitala teknikskiften i olika branscher följer samma mönster"
  innehall: "Tre rader som vardera går från fysisk bärare till digital tjänst: musiken (vinylskiva och cd till streamingtjänst), fotografiet (filmrulle och fotobutik till mobilkamera och molnlagring), bankärendena (bankkontor med kassa till app i mobilen). En gemensam pil under raderna markerar mönstret: informationen lämnar sin fysiska bärare och kostnaden för en kopia går mot noll"
  referens: "Placeras efter fallbeskrivningarna; texten hänvisar till figuren när det gemensamma mönstret formuleras"
  pedagogisk_funktion: "Lyfter eleven från tre berättelser till ett återanvändbart mönster som kan tillämpas på nya branscher i uppgifterna"
  anvands_i: ["1.4.2"]

fig-1.5.1-a:
  syfte: "Visa Amaras tumregel: förväntningarna på ny teknik toppar tidigt medan den verkliga samhällspåverkan kommer senare och blir större"
  innehall: "Två kurvor över samma tidsaxel: en förväntanskurva som stiger brant, toppar och faller, och en påverkanskurva som stiger långsamt men passerar förväntanskurvan och fortsätter växa. Tidsaxeln förankras i mobiltelefonens historia: NMT 1981, GSM på 1990-talet, smartphonen 2007 och vardagsomvandlingen under 2010-talet"
  referens: "Placeras vid tidsmönstret; texten hänvisar till figuren när Amaras tumregel förklaras med mobiltelefonen som exempel"
  pedagogisk_funktion: "Ger eleven en visuell tumregel att lägga över varje ny teknik: var på kurvorna befinner vi oss, och vad säger det om vad som är över- respektive underskattat"
  anvands_i: ["1.5.1"]

fig-2.1.1-a:
  syfte: "Visa att samma behov kan ge helt olika lösningar beroende på hur problemet formuleras"
  innehall: "Förgrenad kedja med Hövdingfallet: behovet att skydda cyklistens huvud överst, därunder två problemformuleringar sida vid sida (gör hjälmen bekvämare respektive skydda huvudet utan att cyklisten bär något på det), och under varje formulering dess lösning: en förbättrad cykelhjälm respektive airbagkragen. Kedjans tre nivåer märks behov, tekniskt problem och teknisk lösning"
  referens: "Placeras vid avsnittet om problemformuleringens makt; texten hänvisar till figuren när Hövdingfallet beskrivs"
  pedagogisk_funktion: "Gör uppslagets kärnidé avläsbar i en bild: problemformuleringen är en vägkorsning, inte en formalitet, och eleven ser exakt var de två vägarna skiljs åt"
  anvands_i: ["2.1.1"]

fig-2.1.2-a:
  syfte: "Visa problemformuleringens tre delar och hur de samspelar i ett verkligt fall"
  innehall: "En komplett problemformulering för ett möbelexempel uppställd i tre fält: funktionen (vad lösningen ska göra, formulerad utan att nämna någon lösning), kraven (prövbara villkor som måste uppfyllas, t.ex. bärförmåga och montering utan verktyg) och begränsningarna (ramar som kostnad, material och fraktvolym). Pilar visar att kraven prövar funktionen och att begränsningarna ramar in båda"
  referens: "Placeras efter att de tre delarna införts; texten hänvisar till figuren när exemplet med det platta paketet formuleras"
  pedagogisk_funktion: "Ger eleven mallen för egen problemformulering: de tre fälten är exakt vad eleven själv ska fylla i under de praktiska uppgifterna"
  anvands_i: ["2.1.2"]

fig-2.2.1-a:
  syfte: "Visa den systematiska problemlösningsprocessen som en loop och förankra varje steg i ett verkligt fall"
  innehall: "Processens sex steg som cirkel: förstå och formulera problemet, ta fram flera idéer, välj mot krav och begränsningar, genomför, testa mot kraven, förbättra. En pil från testa tillbaka till tidigare steg. Vid varje steg en kort notis om vad Houston-teamet gjorde i Apollo 13:s filterproblem, från problemformuleringen till det godkända CO2-värdet"
  referens: "Placeras efter berättelsen om Apollo 13; texten hänvisar till figuren när processens steg gås igenom"
  pedagogisk_funktion: "Kopplar den abstrakta processen till ett dramatiskt verkligt förlopp så att stegen framstår som det snabbaste sättet att arbeta, inte som byråkrati; loopen visar att test som underkänner inte är misslyckanden utan del av processen"
  anvands_i: ["2.2.1"]

fig-2.2.2-a:
  syfte: "Visa hur ett sammansatt tekniskt problem bryts ned i delproblem som kan lösas och testas var för sig"
  innehall: "Nedbrytningsträd för robotgräsklipparen: det sammansatta problemet överst, därunder delproblemen klippa gräset, hålla sig inom arbetsområdet, undvika hinder, försörja sig med energi och tåla väder. Under ett av delproblemen (hålla sig inom området) visas en ytterligare nivå med exempel på hur även det kan delas. Tunna linjer mellan grenarna markerar kopplingar där delarna måste passa ihop"
  referens: "Placeras vid genomgången av robotgräsklipparens nedbrytning; texten hänvisar till figuren när delproblemen räknas upp"
  pedagogisk_funktion: "Ger eleven trädet som visuell form för egen nedbrytning och visar att nedbrytningen följer funktioner, inte fysiska bitar; kopplingslinjerna förebådar insikten att delarna måste passa ihop"
  anvands_i: ["2.2.2"]

fig-2.2.3-a:
  syfte: "Ge eleven en valkarta för problemlösningsstrategi utifrån problemets karaktär"
  innehall: "Diagram med två axlar: kostnaden för ett misslyckat försök (låg till hög) och hur väl förstått problemet är (dåligt till väl). I fälten placeras strategierna med verkliga exempel: pröva och förbättra där försök är billiga (apptester, Edisons glödtrådar), analysera och beräkna först där försök är dyra eller farliga (broar, kärnkraft), återanvänd befintlig lösning där problemet är välkänt (standarder, kardborren) och bryt ned i delproblem där problemet är för stort för ett fält"
  referens: "Placeras vid avsnittet om valet; texten hänvisar till figuren när de två valfrågorna införs"
  pedagogisk_funktion: "Förvandlar strategivalet från tyckande till bedömning: eleven kan placera ett nytt problem på kartan och läsa av vilken strategi som är rimlig, och motivera valet med kartans två frågor"
  anvands_i: ["2.2.3"]

fig-2.3.1-a:
  syfte: "Visa en komplett testplan i ifyllt skick så att eleven ser exakt vad som ska bestämmas före ett test"
  innehall: "Testplan som tabell för en termosflaska med tre krav. Kolumner: krav, testmetod, vad som mäts, godkäntgräns bestämd i förväg, resultat, godkänd eller underkänd. Rader t.ex. håller drycken varm (temperaturmätning efter sex timmar, gräns i grader), tål att tappas (fall från bänkhöjd mot hårt golv, gräns inga läckor eller sprickor), läcker inte i väskan (liggande med vatten i en timme, gräns torrt papper under). Resultatkolumnen ifylld så att ett krav är underkänt"
  referens: "Placeras efter att testplanens delar införts; texten hänvisar till figuren som mall för elevens egen testplan"
  pedagogisk_funktion: "Gör testplanen till något eleven kan härma direkt: tabellen är samma struktur som eleven fyller i under de praktiska uppgifterna, och det underkända kravet visar att en ärlig testplan får visa fel"
  anvands_i: ["2.3.1"]
