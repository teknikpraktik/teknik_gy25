# Bygger granskningswebbplatsen och publicerar den på GitHub Pages vid varje
# push till master. Bygget kör npm run validate automatiskt (prebuild i
# site/package.json), så trasigt innehåll stoppar publiceringen.
#
# Engångsförutsättning i repot: Settings → Pages → Source: "GitHub Actions".
# Publiceras under https://teknikpraktik.github.io/teknik_gy25/ (base path
# konfigurerad i site/src/site-base.mjs).

name: Publicera granskningswebbplatsen

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Installera rotberoenden (skripten)
        run: npm ci
      - name: Installera webbplatsens beroenden
        run: npm ci
        working-directory: site
      - name: Bygg webbplatsen (kör validate som prebuild)
        run: npm run build
        working-directory: site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
